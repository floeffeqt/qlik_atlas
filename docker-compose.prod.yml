services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/floeffeqt/qlik-atlas-backend:latest
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_ENV=${APP_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - CREDENTIALS_AES256_GCM_KEY_B64=${CREDENTIALS_AES256_GCM_KEY_B64}
      - CREDENTIALS_AES256_GCM_KEY_ID=${CREDENTIALS_AES256_GCM_KEY_ID}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-db
      - frontend-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/floeffeqt/qlik-atlas-frontend:latest
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "4001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  frontend-backend:
    driver: bridge
  backend-db:
    driver: bridge
